name: Update Graphs

on:
  push:
    paths-ignore:
      - 'stats/**'
  workflow_dispatch:

jobs:
  update-graphs-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate graphs from existing stats
        run: npm run graphs

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update stat graphs"
          commit_author: GitHub Actions <actions@github.com>